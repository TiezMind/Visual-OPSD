# Text-only SFT baseline config.
# Drives the SFT row of Table 2 (no VT images, no JSD distillation).
# Used by scripts/visual_opsd/run_sft_baseline.sh ->
# scripts/visual_opsd/train_visual_opsd_offline.py with --mode sft.
vlm_sft:
  dataset_names:
  - Spatial_Navigation
  - Jigsaw_Assembly
  - Chart_Refocus
  - Visual_Search
  image_transform_args:
    image_stride: 14
    max_image_size: 980
    min_image_size: 378
    max_pixels: 2_007_040
  frame_sampler_args:
    max_num_frames: 12
    min_num_frames: 8
  is_mandatory: true
  shuffle_lines: True
  shuffle_seed: 0
  num_used_data:
  - 6000
  - 6000
  - 6000
  - 6990
  weight: 1
